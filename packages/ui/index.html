<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="__WELL_900_DARK__" />
    <script>
      // Set the theme before first paint — no flash. Mirrors lib/theme.ts resolve():
      // an explicit pick wins, else the OS preference.
      (function () {
        try {
          var s = localStorage.getItem('mimir-theme');
          var t =
            s === 'light' || s === 'dark'
              ? s
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/icons/mimir.svg" />
    <link rel="apple-touch-icon" href="/icons/mimir-maskable.svg" />
    <title>Mimir</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
