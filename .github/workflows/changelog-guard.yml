name: Changelog guard

# Fail any PR that changes build-affecting paths but carries no changelog
# fragment under .changes/ â€” the backstop for the finishing-work skill's
# CHANGELOG gate (MMR-109, reshaped by ADR 0022). Fragments replaced the shared
# [Unreleased] append point in CHANGELOG.md, which made every parallel merge
# train conflict (MMR-267); CHANGELOG.md itself is now written only at the
# release cut.
#
# Escape hatch: a behavior-preserving PR (internal refactor, test/build-meta
# only) applies the `skip-changelog` label instead of a fragment.
#
# Runs on every PR and self-determines applicability (like version-guard) so it
# is always a runnable, requireable check â€” a `paths:`-filtered required check
# would hang "pending" on PRs that don't match. `labeled`/`unlabeled` are listed
# so that applying `skip-changelog` re-runs the gate (a label change does not
# fire `synchronize`).
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  changelog-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require a changelog fragment for build-affecting changes
        id: gate
        env:
          # Visible PR escape hatch â€” kept here for the audit trail.
          HAS_SKIP_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          base="origin/${BASE_REF}"

          # Build-affecting paths â€” keep in sync with prerelease.yml's path filter
          # (GitHub Actions can't share a filter across workflows). A change outside
          # these can't affect the shipped binary, so it needs no changelog entry.
          changed=$(git diff --name-only "${base}...HEAD")
          if ! echo "$changed" | grep -qE '^(packages/|skills/mimir/|package\.json$|bun\.lock$|install\.sh$|\.github/workflows/(release|prerelease)\.yml$)'; then
            echo "No build-affecting paths changed â€” changelog fragment not required."
            exit 0
          fi

          if [ "$HAS_SKIP_LABEL" = "true" ]; then
            echo "skip-changelog label present â€” fragment waived (visible at merge)."
            exit 0
          fi

          # Any touch of a fragment satisfies the gate: added (the normal case),
          # modified (amending an entry), or deleted (the release-cut PR compiles
          # fragments away). Fragments live flat in .changes/ â€” the compiler does
          # not recurse, so a nested path does not count.
          fragments=$(echo "$changed" | grep -E '^\.changes/[^/]+\.md$' | grep -v '^\.changes/README\.md$' || true)
          if [ -z "$fragments" ]; then
            echo "::error::Build-affecting change with no changelog fragment. Add .changes/<slug>.md (see .changes/README.md), or apply the 'skip-changelog' label if this is behavior-preserving."
            exit 1
          fi

          # Fragments that exist on head get parsed by the compiler itself (next
          # step) â€” one grammar, shared with the release cut, instead of a looser
          # re-implementation here (ADR 0022 retired the [Unreleased] bullet-diff
          # and its false PASS/FAIL edges). Deleted-only means the release-cut PR:
          # nothing to parse, gate satisfied.
          present=$(echo "$fragments" | while IFS= read -r f; do [ -f "$f" ] && echo "$f" || true; done)
          if [ -z "$present" ]; then
            echo "Fragment deletions only â€” the release-cut compile. Gate satisfied."
            exit 0
          fi
          echo "$present" > "$RUNNER_TEMP/fragments.txt"
          echo "parse=true" >> "$GITHUB_OUTPUT"
          echo "Changelog fragment(s) present, parsing with the compiler:"
          echo "$present"

      - name: Set up Bun
        if: steps.gate.outputs.parse == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        if: steps.gate.outputs.parse == 'true'
        run: bun install --frozen-lockfile

      - name: Parse fragments with the compiler's parser
        if: steps.gate.outputs.parse == 'true'
        run: |
          set -euo pipefail
          # shellcheck disable=SC2046 -- fragment paths are flat slugs, no spaces
          bun packages/bin/scripts/compile-changelog.ts --check $(tr '\n' ' ' < "$RUNNER_TEMP/fragments.txt")
