name: Release

# Tag-driven releases. A `vX.Y.Z` tag builds standalone binaries (one per
# platform, each on its native runner so there is no cross-compile) and
# publishes a GitHub Release with notes pulled from CHANGELOG.md. The build
# matrix also runs on pull requests (build-only, no publish) so the release
# path is validated before a tag is ever cut.
on:
  push:
    tags: ['v*']
  # The prerelease tagger pushes vX.Y.Z-next.N tags with GITHUB_TOKEN, which
  # GitHub's anti-recursion guard blocks from triggering the `push: tags` event
  # above. It dispatches this workflow at the new tag instead (workflow_dispatch
  # via GITHUB_TOKEN is the documented exception that DOES start a run). The
  # build/publish steps read github.ref_name/ref_type, which resolve from the
  # dispatched --ref exactly as they do for a pushed tag (MMR-57).
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/**'
      - 'skills/mimir/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/release.yml'
      - 'install.sh'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, asset: mimir-darwin-arm64 }
          - { os: ubuntu-latest, asset: mimir-linux-x64 }
          - { os: ubuntu-24.04-arm, asset: mimir-linux-arm64 }
          # darwin-x64 (Intel mac) is deferred — the macOS x64 runner is scarce
          # and bun's cross-compile is unreliable from an arm64 host. Intel-mac
          # users install from source (`bun add -g github:dbtlr/mimir`).
    steps:
      - uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The store-backed suites run against the real `norn` binary (MMR-234).
      # Same pinned install as ci.yml — bump the pin with intent, never float.
      - name: Install norn (pinned)
        env:
          NORN_VERSION: v0.47.0
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64) target=aarch64-apple-darwin ;;
            Linux-x86_64) target=x86_64-unknown-linux-musl ;;
            Linux-aarch64) target=aarch64-unknown-linux-musl ;;
            *) echo "unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          asset="norn-run-${target}.tar.xz"
          base="https://github.com/dbtlr/norn/releases/download/${NORN_VERSION}"
          curl -fsSLO "${base}/${asset}"
          curl -fsSLO "${base}/${asset}.sha256"
          shasum -a 256 -c "${asset}.sha256"
          tar -xf "$asset"
          mkdir -p norn-bin && mv "norn-run-${target}/norn" norn-bin/
          echo "${RUNNER_TEMP}/norn-bin" >> "$GITHUB_PATH"
          ./norn-bin/norn --version

      # Test on the target platform before shipping its binary.
      - name: Test
        run: bun run test

      # On a tag build, bake the tag (minus the leading v) as MIMIR_BUILD_VERSION —
      # both the binary compile below and the vite build read it (MMR-260), so
      # `--version`/`/api/health` and the embedded console report the exact same
      # release (MMR-57). PR build-validation runs on a branch ref and both sides
      # fall back to their package.json instead — fine, those binaries aren't
      # published.
      - name: Determine build version
        if: github.ref_type == 'tag'
        run: echo "MIMIR_BUILD_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # The console builds before the binary so its dist embeds (ADR 0013):
      # vite build → generate the asset manifest → compile.
      - name: Build UI
        run: bun run build:ui && bun run assets

      - name: Compile
        run: |
          mkdir -p dist
          # Every compiled artifact is a production binary — target the
          # user-global store + port, not the from-source dev defaults (MMR-117).
          define=(--define "MIMIR_BUILD_PROFILE=\"production\"")
          if [ -n "${MIMIR_BUILD_VERSION:-}" ]; then
            define+=(--define "MIMIR_BUILD_VERSION=\"${MIMIR_BUILD_VERSION}\"")
          fi
          bun build packages/bin/src/main.ts --compile "${define[@]}" \
            --outfile "dist/${{ matrix.asset }}"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum mimir-* > SHA256SUMS
          cat SHA256SUMS

      - name: Extract changelog notes
        run: |
          ver="${GITHUB_REF_NAME}"
          awk -v ver="$ver" '
            $0 ~ "^## " ver " " { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          echo "--- release notes ---"; cat release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: |
            dist/mimir-*
            dist/SHA256SUMS
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true

      # Prune stale prerelease tags + Releases at an official cut (MMR-58).
      # Lag-by-one retention: delete prereleases from cycles OLDER than the
      # previous official (so the just-shipped cycle's trail survives one more
      # release). Gated to official tags and best-effort, so a pruning hiccup
      # never fails a real release. Enumerates via `gh` because this job's
      # checkout is shallow and tagless, and the binaries live on the Releases.
      #
      # LIVE: deletes the prerelease Release + its tag. The dry-run was
      # validated at the v0.7.0 cut (lag-by-one correct, 0 deletions, no
      # cycles < the previous official yet) before enabling here (MMR-58).
      - name: Prune stale prereleases
        if: ${{ !contains(github.ref_name, '-') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cut="${GITHUB_REF_NAME#v}"   # X.Y.Z being cut (official)

          # Previous official = highest non-prerelease version strictly < cut.
          prev=""
          while read -r v; do
            [ "$v" = "$cut" ] && continue
            [ "$(printf '%s\n%s\n' "$v" "$cut" | sort -V | tail -1)" = "$cut" ] && prev="$v"
          done < <(gh release list --limit 500 --json tagName,isPrerelease \
                     --jq '.[] | select(.isPrerelease == false) | .tagName' \
                   | sed 's/^v//' | sort -V)

          if [ -z "$prev" ]; then
            echo "No previous official before $cut; nothing to prune."
            exit 0
          fi
          echo "Cut $cut; previous official $prev — pruning prerelease cycles < $prev."

          gh release list --limit 500 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | .tagName' \
          | while read -r tag; do
              base="${tag#v}"; base="${base%%-next.*}"   # cycle A.B.C
              lowest="$(printf '%s\n%s\n' "$base" "$prev" | sort -V | head -1)"
              if [ "$base" != "$prev" ] && [ "$lowest" = "$base" ]; then
                echo "deleting prerelease $tag (cycle $base < $prev)"
                gh release delete "$tag" --yes --cleanup-tag
              else
                echo "keep $tag (cycle $base >= $prev)"
              fi
            done
