name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The store-backed suites run against the real `norn` binary (MMR-234 —
      # the Norn vault is the only backend). Pinned deliberately: norn is
      # pre-1.0 and contract breaks are absorbed on purpose (MMR-297 adopted
      # 0.48 — plans schema v2, reports schema v3, NRN-264) — bump the pin with
      # intent, never float to latest. The release installer's PATH handling is
      # rc-file-based, so the binary goes on GITHUB_PATH by hand.
      - name: Install norn (pinned)
        env:
          NORN_VERSION: v0.48.0
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          # Digests pinned from the v0.48.0 release assets — a bumped
          # NORN_VERSION moves these too (the release's own .sha256 files live
          # in the same mutable release, so they can't be the trust anchor).
          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64)
              target=aarch64-apple-darwin
              sha256=146c150fabd3ad80593779e0bebd1bb6be23d393e880ee1366f8bb7dea4e6607 ;;
            Linux-x86_64)
              target=x86_64-unknown-linux-musl
              sha256=9985e026e7974b00ed20fceb964f18265b57e393dbd798a9d4a6df8974cac165 ;;
            Linux-aarch64)
              target=aarch64-unknown-linux-musl
              sha256=f3c7adf0af86fd1f449cbab147bc507ba5312c1f113805cb67efb46fb1f2fc8e ;;
            *) echo "unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          asset="norn-run-${target}.tar.xz"
          base="https://github.com/dbtlr/norn/releases/download/${NORN_VERSION}"
          curl -fsSLO "${base}/${asset}"
          echo "${sha256}  ${asset}" | shasum -a 256 -c
          tar -xf "$asset"
          mkdir -p norn-bin && mv "norn-run-${target}/norn" norn-bin/
          echo "${RUNNER_TEMP}/norn-bin" >> "$GITHUB_PATH"
          ./norn-bin/norn --version

      # The same gate enforced locally: oxfmt + oxlint + type-aware typecheck,
      # warnings treated as errors (vite.config.ts: denyWarnings, maxWarnings 0).
      # `check`/`test` regenerate the embedded-UI manifest first (ADR 0013).
      - name: Check (format · lint · typecheck)
        run: bun run check

      - name: Test
        run: bun run test

      - name: Test UI
        run: bun run test:ui
