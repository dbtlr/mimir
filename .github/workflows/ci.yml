name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The same gate enforced locally: oxfmt + oxlint + type-aware typecheck,
      # warnings treated as errors (vite.config.ts: denyWarnings, maxWarnings 0).
      - name: Check (format · lint · typecheck)
        run: bun run check

      - name: Test
        run: bun test
